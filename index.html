<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23121212'/%3E%3Crect x='30' y='40' width='40' height='6' fill='%23f0f0f0'/%3E%3Crect x='30' y='54' width='40' height='6' fill='%23f0f0f0'/%3E%3Crect x='30' y='68' width='24' height='6' fill='%23f0f0f0'/%3E%3C/svg%3E">
<title>68 music app</title>
<style>
  :root {
    --bg: #121212;
    --surface: #1c1c1c;
    --surface-raised: #262626;
    --hairline: #323232;
    --text: #f0f0f0;
    --text-dim: #a0a0a0;
    --text-faint: #6e6e6e;
    --accent: #c8c8c8;
    --accent-soft: rgba(200, 200, 200, 0.12);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overscroll-behavior: none;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  body { display: flex; justify-content: center; }

  #app {
    width: 100%;
    max-width: 1024px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ---------- Four resizable panes ---------- */
  .pane { min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  #menu-pane     { min-height: 48px; }
  #library-pane  { min-height: 60px; }
  #playlist-pane { min-height: 60px; justify-content: center; padding: 8px 24px; }
  #settings-pane { min-height: 64px; }

  /* ---------- Resize handles (long-press, then drag) ---------- */
  .resize-handle {
    flex: 0 0 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    cursor: row-resize;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
  }
  .resize-handle .grip { width: 36px; height: 3px; background: var(--hairline); }
  .resize-handle.dragging { background: var(--text); }
  .resize-handle.dragging .grip { background: var(--bg); }

  /* ---------- Win95 / terminal-style bevel buttons (no icons anywhere except slider thumbs) ---------- */
  .text-btn {
    appearance: none;
    background: var(--surface);
    border-style: solid;
    border-width: 2px;
    border-color: rgba(255,255,255,0.55) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.55);
    border-radius: 0;
    color: var(--text);
    padding: 7px 13px;
    font-family: var(--mono);
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
    white-space: nowrap;
  }
  .text-btn:active, .text-btn.active {
    border-color: rgba(0,0,0,0.55) rgba(255,255,255,0.55) rgba(255,255,255,0.55) rgba(0,0,0,0.55);
  }
  .text-btn.small { font-size: 0.59375rem; padding: 4px 9px; }
  .text-btn.primary { font-size: 0.8125rem; padding: 9px 20px; }

  /* ---------- Menu pane ---------- */
  #menu-pane { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 16px; gap: 10px; }
  .app-title-wrap { position: relative; }
  .title-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--surface); border: 2px solid;
    border-color: rgba(255,255,255,0.55) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.55);
    display: flex; flex-direction: column; gap: 4px; padding: 6px; z-index: 30; min-width: 200px;
  }
  .title-menu .text-btn { text-align: left; }
  .menu-actions { display: flex; gap: 8px; }

  /* ---------- Library list ---------- */
  #library { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .track-row {
    display: grid; grid-template-columns: 28px 1fr auto auto auto;
    align-items: center; gap: 9px; padding: 9px 18px;
    border-bottom: 1px solid var(--hairline); cursor: pointer;
  }
  .track-row.current { background: var(--accent-soft); }
  .track-row:active { background: var(--surface-raised); }

  .track-index { font-size: 0.75rem; color: var(--text-faint); text-align: right; font-variant-numeric: tabular-nums; }
  .track-row.current .track-index { color: var(--text); font-weight: 700; }

  .track-title { font-size: 0.875rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-row.current .track-title { font-weight: 800; }

  .pill {
    font-size: 0.59375rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text-dim); border: 1px solid var(--hairline); padding: 2px 5px;
  }

  .track-duration { font-size: 0.78125rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .track-delete { display: none; }
  body.edit-mode .track-delete { display: inline-flex; }
  body.edit-mode .track-duration { display: none; }

  .empty-state { padding: 12% 28px 0 28px; text-align: center; }
  .empty-state .line1 { font-size: 1rem; font-weight: 700; margin: 0 0 8px 0; }
  .empty-state .line2 { font-size: 0.8125rem; color: var(--text-dim); }

  /* ---------- Playlist / Now Playing pane ---------- */
  .np-meta-block { text-align: center; }
  .np-title { font-size: 1.0625rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .np-edit-input {
    background: var(--surface); border: 1px solid var(--accent); color: var(--text);
    font-family: var(--mono); font-size: 0.9375rem; padding: 4px 9px; width: 60%; text-align: center;
  }

  .np-progress { margin-top: 16px; }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--hairline); border-radius: 2px; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); margin-top: -6px;
  }
  .np-times { display: flex; justify-content: space-between; font-size: 0.71875rem; color: var(--text-dim); margin-top: 5px; }

  .np-transport { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; }
  .np-modes { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; }
  .np-modes .text-btn { min-width: 96px; }

  .np-error { margin-top: 10px; font-size: 0.75rem; text-align: center; font-weight: 700; }

  /* ---------- Settings pane ---------- */
  #settings-pane { flex-direction: row; align-items: center; gap: 20px; padding: 6px 20px; }
  .setting-group { flex: 1 1 0; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .setting-label {
    font-size: 0.59375rem; letter-spacing: 0.04em; color: var(--text-faint);
    text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .setting-label .value { color: var(--text); }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top, 0) + 10px);
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface-raised); border: 1px solid var(--hairline); color: var(--text);
    font-size: 0.75rem; padding: 9px 16px; max-width: 86%; text-align: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease; z-index: 50;
  }
  #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  #file-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <section class="pane" id="menu-pane">
    <div class="app-title-wrap">
      <button class="text-btn" id="app-title-btn">68 music app</button>
      <div class="title-menu" id="title-menu" hidden>
        <button class="text-btn small" data-url="https://github.com/68berry/music">github.com/68berry/music</button>
        <button class="text-btn small" data-url="https://68berry.github.io/music">68berry.github.io/music</button>
      </div>
    </div>
    <div class="menu-actions">
      <button class="text-btn" id="select-btn">Select Tracks</button>
      <button class="text-btn" id="add-btn">Add Track</button>
    </div>
  </section>

  <div class="resize-handle" id="handle-0"><div class="grip"></div></div>

  <section class="pane" id="library-pane">
    <div id="library"></div>
  </section>

  <div class="resize-handle" id="handle-1"><div class="grip"></div></div>

  <section class="pane" id="playlist-pane">
    <div id="np-content"></div>
  </section>

  <div class="resize-handle" id="handle-2"><div class="grip"></div></div>

  <section class="pane" id="settings-pane">
    <div class="setting-group">
      <span class="setting-label">VOLUME</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="setting-group">
      <span class="setting-label">TEXT SIZE <span class="value" id="fontsize-values">16PX / 12.0PT / 1.00REM</span></span>
      <input type="range" id="fontsize-slider" min="8" max="24" step="1" value="16">
    </div>
    <div class="setting-group">
      <span class="setting-label">APPEARANCE (WHITE &#8594; BLACK)</span>
      <input type="range" id="theme-slider" min="0" max="100" step="1" value="100">
    </div>
  </section>

  <input type="file" id="file-input" multiple accept="audio/*,.opus,.ogg,.flac,.m4a,.mp3,.wav,.aiff,.aac">
  <div id="toast"></div>
  <audio id="audio" preload="metadata"></audio>
</div>

<script>
(() => {
  "use strict";

  // ---------------- IndexedDB ----------------
  const DB_NAME = "music-app-68";
  const DB_VERSION = 1;
  const STORE = "tracks";

  function openDB() {
    return new Promise((resolve, reject) => {
      if (!("indexedDB" in window)) { reject(new Error("IndexedDB is not available")); return; }
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function dbPut(track) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(track);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function dbGetAll() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  async function dbDelete(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // ---------------- State ----------------
  const state = {
    tracks: [],
    queue: [],
    currentIndex: -1,
    currentTrack: null,
    isPlaying: false,
    repeatMode: "off", // off | all | one
    shuffle: false,
    editMode: false,
    currentObjectURL: null,
    paneRatios: [10, 40, 40, 10], // menu, library, playlist, settings
  };

  const SUPPORTED_EXT = ["opus", "ogg", "flac", "m4a", "mp3", "wav", "aiff", "aac", "caf"];
  const SETTINGS_KEY = "music-app-68-settings";
  const PANE_MIN = 6;
  const PANE_MAX = 70;

  // Grayscale-only palette: white at t=0, black at t=1. No hue anywhere.
  const LIGHT = { bg:[250,250,250], surface:[240,240,240], surfaceRaised:[228,228,228], hairline:[210,210,210], text:[20,20,20], textDim:[100,100,100], textFaint:[150,150,150], accent:[80,80,80] };
  const DARK  = { bg:[18,18,18], surface:[28,28,28], surfaceRaised:[38,38,38], hairline:[50,50,50], text:[240,240,240], textDim:[160,160,160], textFaint:[110,110,110], accent:[200,200,200] };

  // ---------------- DOM refs ----------------
  const $ = (id) => document.getElementById(id);
  const audio = $("audio");
  const libraryEl = $("library");
  const npContent = $("np-content");
  const toastEl = $("toast");
  const fileInput = $("file-input");
  const appEl = $("app");

  const panes = [$("menu-pane"), $("library-pane"), $("playlist-pane"), $("settings-pane")];

  // ---------------- Helpers ----------------
  function uid() {
    return (crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2));
  }

  function formatTime(sec) {
    if (!isFinite(sec) || sec < 0) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ":" + String(s).padStart(2, "0");
  }

  function titleFromFilename(name) {
    return name.replace(/\.[^.]+$/, "");
  }

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add("visible");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove("visible"), 3200);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  // ---------------- Settings: volume / text size / appearance / pane ratios ----------------
  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* fall back to defaults */ }
    return { volume: 1, fontSize: 16, theme: 100, paneRatios: [10, 40, 40, 10] };
  }

  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        volume: parseFloat($("volume-slider").value),
        fontSize: parseInt($("fontsize-slider").value, 10),
        theme: parseInt($("theme-slider").value, 10),
        paneRatios: state.paneRatios,
      }));
    } catch (e) { /* not fatal */ }
  }

  function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
  function lerpColor(c1, c2, t) { return `rgb(${lerp(c1[0],c2[0],t)},${lerp(c1[1],c2[1],t)},${lerp(c1[2],c2[2],t)})`; }

  function applyTheme(percent) {
    const t = percent / 100;
    const root = document.documentElement.style;
    root.setProperty("--bg", lerpColor(LIGHT.bg, DARK.bg, t));
    root.setProperty("--surface", lerpColor(LIGHT.surface, DARK.surface, t));
    root.setProperty("--surface-raised", lerpColor(LIGHT.surfaceRaised, DARK.surfaceRaised, t));
    root.setProperty("--hairline", lerpColor(LIGHT.hairline, DARK.hairline, t));
    root.setProperty("--text", lerpColor(LIGHT.text, DARK.text, t));
    root.setProperty("--text-dim", lerpColor(LIGHT.textDim, DARK.textDim, t));
    root.setProperty("--text-faint", lerpColor(LIGHT.textFaint, DARK.textFaint, t));
    root.setProperty("--accent", lerpColor(LIGHT.accent, DARK.accent, t));
  }

  function applyFontSize(px) {
    document.documentElement.style.fontSize = px + "px";
    const pt = (px * 0.75).toFixed(1);
    const rem = (px / 16).toFixed(2);
    $("fontsize-values").textContent = `${px}PX / ${pt}PT / ${rem}REM`;
  }

  function applyPaneRatios() {
    panes.forEach((el, i) => {
      el.style.flexGrow = state.paneRatios[i];
      el.style.flexShrink = 1;
      el.style.flexBasis = "0%";
    });
  }

  function initSettings() {
    const s = loadSettings();
    $("volume-slider").value = s.volume;
    $("fontsize-slider").value = s.fontSize;
    $("theme-slider").value = s.theme;
    if (Array.isArray(s.paneRatios) && s.paneRatios.length === 4) state.paneRatios = s.paneRatios;
    audio.volume = s.volume;
    applyFontSize(s.fontSize);
    applyTheme(s.theme);
    applyPaneRatios();
  }

  $("volume-slider").addEventListener("input", (e) => {
    audio.volume = parseFloat(e.target.value);
    saveSettings();
  });
  $("fontsize-slider").addEventListener("input", (e) => {
    applyFontSize(parseInt(e.target.value, 10));
    saveSettings();
  });
  $("theme-slider").addEventListener("input", (e) => {
    applyTheme(parseInt(e.target.value, 10));
    saveSettings();
  });

  // ---------------- Resize handles (long-press, then drag up/down) ----------------
  function setupResizeHandle(handleEl, aboveIndex, belowIndex) {
    const LONG_PRESS_MS = 450;
    let pressTimer = null;
    let dragging = false;
    let startY = 0;
    let startRatios = null;

    function endDrag() {
      dragging = false;
      handleEl.classList.remove("dragging");
      saveSettings();
    }

    handleEl.addEventListener("pointerdown", (e) => {
      clearTimeout(pressTimer);
      pressTimer = setTimeout(() => {
        dragging = true;
        startY = e.clientY;
        startRatios = state.paneRatios.slice();
        handleEl.classList.add("dragging");
        try { handleEl.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
      }, LONG_PRESS_MS);
    });

    handleEl.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      e.preventDefault();
      const deltaY = e.clientY - startY;
      const totalHeight = appEl.clientHeight || 1;
      let delta = (deltaY / totalHeight) * 100;

      delta = Math.max(delta, PANE_MIN - startRatios[aboveIndex]);
      delta = Math.min(delta, PANE_MAX - startRatios[aboveIndex]);
      delta = Math.min(delta, startRatios[belowIndex] - PANE_MIN);
      delta = Math.max(delta, startRatios[belowIndex] - PANE_MAX);

      state.paneRatios[aboveIndex] = startRatios[aboveIndex] + delta;
      state.paneRatios[belowIndex] = startRatios[belowIndex] - delta;
      applyPaneRatios();
    });

    handleEl.addEventListener("pointerup", () => { clearTimeout(pressTimer); if (dragging) endDrag(); });
    handleEl.addEventListener("pointercancel", () => { clearTimeout(pressTimer); if (dragging) endDrag(); });
    handleEl.addEventListener("pointerleave", () => { if (!dragging) clearTimeout(pressTimer); });
  }

  setupResizeHandle($("handle-0"), 0, 1);
  setupResizeHandle($("handle-1"), 1, 2);
  setupResizeHandle($("handle-2"), 2, 3);

  // ---------------- App title link menu ----------------
  const titleMenu = $("title-menu");
  $("app-title-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    titleMenu.hidden = !titleMenu.hidden;
  });
  titleMenu.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-url]");
    if (!btn) return;
    window.open(btn.getAttribute("data-url"), "_blank", "noopener");
    titleMenu.hidden = true;
  });
  document.addEventListener("click", (e) => {
    if (!titleMenu.hidden && !e.target.closest(".app-title-wrap")) titleMenu.hidden = true;
  });

  // ---------------- Import ----------------
  fileInput.addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    let imported = 0;
    for (const file of files) {
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      if (!SUPPORTED_EXT.includes(ext)) continue;
      const track = {
        id: uid(), title: titleFromFilename(file.name), duration: 0,
        fileName: file.name, extension: ext, mimeType: file.type || "",
        blob: file, addedAt: Date.now(), playCount: 0,
      };
      try { await dbPut(track); imported++; }
      catch (err) { showToast(`Couldn't save "${file.name}"`); }
    }
    fileInput.value = "";
    showToast(imported === 0 ? "No supported audio files found" : `${imported} track(s) added`);
    await refreshLibrary();
  });

  $("add-btn").addEventListener("click", () => fileInput.click());

  $("select-btn").addEventListener("click", () => {
    state.editMode = !state.editMode;
    $("select-btn").textContent = state.editMode ? "Done" : "Select Tracks";
    $("select-btn").classList.toggle("active", state.editMode);
    document.body.classList.toggle("edit-mode", state.editMode);
  });

  // ---------------- Library rendering ----------------
  async function refreshLibrary() {
    try { state.tracks = await dbGetAll(); }
    catch (err) { showToast("Couldn't load your library"); state.tracks = []; }
    state.tracks.sort((a, b) => a.title.localeCompare(b.title));
    renderLibrary();
  }

  function renderLibrary() {
    const tracks = state.tracks;

    if (tracks.length === 0) {
      libraryEl.innerHTML = `
        <div class="empty-state">
          <div class="line1">Bop bop just feel the music</div>
          <div class="line2">AAC/M4A / AIFF / FLAC / MP3 / Opus / WAV</div>
        </div>`;
      return;
    }

    libraryEl.innerHTML = tracks.map((t, i) => {
      const isCurrent = state.currentTrack && state.currentTrack.id === t.id;
      const indexLabel = isCurrent ? "&gt;&gt;" : String(i + 1).padStart(2, "0");
      const opusPill = t.extension === "opus" ? `<span class="pill">OPUS</span>` : `<span></span>`;
      return `
        <div class="track-row${isCurrent ? " current" : ""}" data-id="${t.id}">
          <div class="track-index">${indexLabel}</div>
          <div class="track-title">${escapeHtml(t.title)}</div>
          ${opusPill}
          <div class="track-duration">${t.duration ? formatTime(t.duration) : "--:--"}</div>
          <button class="text-btn small track-delete" data-delete-id="${t.id}">Delete</button>
        </div>`;
    }).join("");
  }

  libraryEl.addEventListener("click", async (e) => {
    const deleteBtn = e.target.closest("[data-delete-id]");
    if (deleteBtn) {
      const id = deleteBtn.getAttribute("data-delete-id");
      const track = state.tracks.find(t => t.id === id);
      if (track && confirm(`Delete "${track.title}"?`)) {
        await dbDelete(id);
        if (state.currentTrack && state.currentTrack.id === id) stopPlayback();
        await refreshLibrary();
      }
      return;
    }
    if (state.editMode) return;
    const row = e.target.closest(".track-row");
    if (!row) return;
    const id = row.getAttribute("data-id");
    const index = state.tracks.findIndex(t => t.id === id);
    if (index >= 0) playQueueAt(state.tracks, index);
  });

  // ---------------- Playlist / Now Playing pane rendering ----------------
  function renderNowPlayingShell() {
    const t = state.currentTrack;
    if (!t) {
      npContent.innerHTML = "";
      return;
    }
    npContent.innerHTML = `
      <div class="np-meta-block">
        <div class="np-title-row">
          <span class="np-title" id="np-title">${escapeHtml(t.title)}</span>
          <button class="text-btn small" id="np-edit-btn">Edit</button>
        </div>
      </div>

      <div class="np-progress">
        <input type="range" id="np-seek" min="0" max="1" step="0.1" value="0">
        <div class="np-times"><span id="np-current-time">0:00</span><span id="np-duration">0:00</span></div>
      </div>

      <div class="np-transport">
        <button class="text-btn" id="np-prev">Prev</button>
        <button class="text-btn primary" id="np-playpause">Play</button>
        <button class="text-btn" id="np-next">Next</button>
      </div>

      <div class="np-modes">
        <button class="text-btn" id="np-shuffle">Shuffle</button>
        <button class="text-btn" id="np-repeat">Repeat Off</button>
      </div>

      <div class="np-error" id="np-error"></div>
    `;

    $("np-playpause").addEventListener("click", togglePlayPause);
    $("np-prev").addEventListener("click", prev);
    $("np-next").addEventListener("click", next);
    $("np-shuffle").addEventListener("click", () => { state.shuffle = !state.shuffle; updateAll(); });
    $("np-repeat").addEventListener("click", () => {
      state.repeatMode = state.repeatMode === "off" ? "all" : state.repeatMode === "all" ? "one" : "off";
      updateAll();
    });
    $("np-edit-btn").addEventListener("click", openMetadataEditor);

    const seekEl = $("np-seek");
    seekEl.addEventListener("input", () => {
      seekDragging = true;
      $("np-current-time").textContent = formatTime(parseFloat(seekEl.value));
    });
    seekEl.addEventListener("change", () => { seek(parseFloat(seekEl.value)); seekDragging = false; });

    updateAll();
  }

  function openMetadataEditor() {
    const t = state.currentTrack;
    if (!t) return;
    const titleEl = $("np-title");

    const titleInput = document.createElement("input");
    titleInput.className = "np-edit-input";
    titleInput.value = t.title;
    titleInput.placeholder = "Title";

    titleEl.replaceWith(titleInput);
    titleInput.focus();

    async function commit() {
      t.title = titleInput.value.trim() || t.title;
      await dbPut(t).catch(() => {});
      updateMediaSession(t);
      renderNowPlayingShell();
      renderLibrary();
    }
    titleInput.addEventListener("blur", commit);
    titleInput.addEventListener("keydown", (e) => { if (e.key === "Enter") titleInput.blur(); });
  }

  // ---------------- Playback ----------------
  function playQueueAt(tracks, index) {
    state.queue = tracks;
    state.currentIndex = index;
    loadAndPlay(tracks[index]);
  }

  function loadAndPlay(track) {
    if (state.currentObjectURL) URL.revokeObjectURL(state.currentObjectURL);
    const url = URL.createObjectURL(track.blob);
    state.currentObjectURL = url;
    const isNewTrack = !state.currentTrack || state.currentTrack.id !== track.id;
    state.currentTrack = track;
    audio.src = url;

    if (isNewTrack) renderNowPlayingShell();
    else { const errEl = $("np-error"); if (errEl) errEl.textContent = ""; }

    audio.play().then(() => {
      state.isPlaying = true;
      track.playCount = (track.playCount || 0) + 1;
      dbPut(track).catch(() => {});
      updateAll();
    }).catch(err => {
      state.isPlaying = false;
      const errEl = $("np-error");
      if (errEl) errEl.textContent = `Can't play this file: ${err.message || "unsupported format"}`;
      updateAll();
    });

    updateMediaSession(track);
    updateAll();
  }

  function stopPlayback() {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    if (state.currentObjectURL) URL.revokeObjectURL(state.currentObjectURL);
    state.currentObjectURL = null;
    state.currentTrack = null;
    state.isPlaying = false;
    state.queue = [];
    state.currentIndex = -1;
    renderNowPlayingShell();
    updateAll();
  }

  function togglePlayPause() {
    if (!state.currentTrack) return;
    if (audio.paused) audio.play().then(() => { state.isPlaying = true; updateAll(); }).catch(() => {});
    else { audio.pause(); state.isPlaying = false; updateAll(); }
  }

  function seek(time) { audio.currentTime = time; }

  function advance(direction) {
    if (state.queue.length === 0) return;
    let idx = state.shuffle ? Math.floor(Math.random() * state.queue.length) : state.currentIndex + direction;
    if (idx < 0) {
      if (state.repeatMode === "all") idx = state.queue.length - 1;
      else { audio.pause(); state.isPlaying = false; updateAll(); return; }
    } else if (idx >= state.queue.length) {
      if (state.repeatMode === "all") idx = 0;
      else { audio.pause(); state.isPlaying = false; updateAll(); return; }
    }
    state.currentIndex = idx;
    loadAndPlay(state.queue[idx]);
  }

  function next() { advance(1); }
  function prev() { if (audio.currentTime > 3) { seek(0); return; } advance(-1); }

  audio.addEventListener("ended", () => {
    if (state.repeatMode === "one" && state.currentTrack) { loadAndPlay(state.currentTrack); return; }
    next();
  });
  audio.addEventListener("timeupdate", updateProgress);
  audio.addEventListener("durationchange", () => {
    if (state.currentTrack && audio.duration && isFinite(audio.duration) && !state.currentTrack.duration) {
      state.currentTrack.duration = audio.duration;
      dbPut(state.currentTrack).catch(() => {});
      renderLibrary();
    }
    updateProgress();
  });
  audio.addEventListener("error", () => {
    const errEl = $("np-error");
    if (errEl) errEl.textContent = "Can't play this file (unsupported format)";
    state.isPlaying = false;
    updateAll();
  });

  // ---------------- MediaSession (lock screen controls) ----------------
  function updateMediaSession(track) {
    if (!("mediaSession" in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: track.title });
    navigator.mediaSession.setActionHandler("play", () => { audio.play(); state.isPlaying = true; updateAll(); });
    navigator.mediaSession.setActionHandler("pause", () => { audio.pause(); state.isPlaying = false; updateAll(); });
    navigator.mediaSession.setActionHandler("previoustrack", prev);
    navigator.mediaSession.setActionHandler("nexttrack", next);
    navigator.mediaSession.setActionHandler("seekto", (details) => { if (details.seekTime != null) seek(details.seekTime); });
  }

  // ---------------- UI update ----------------
  let seekDragging = false;

  function updateProgress() {
    if (seekDragging) return;
    const seekEl = $("np-seek");
    if (!seekEl) return;
    const d = audio.duration && isFinite(audio.duration) ? audio.duration : (state.currentTrack ? state.currentTrack.duration : 0);
    seekEl.max = d || 1;
    seekEl.value = audio.currentTime || 0;
    $("np-current-time").textContent = formatTime(audio.currentTime || 0);
    $("np-duration").textContent = formatTime(d || 0);
  }

  function repeatLabel() {
    if (state.repeatMode === "one") return "Repeat One";
    if (state.repeatMode === "all") return "Repeat All";
    return "Repeat Off";
  }

  function updateAll() {
    const playBtn = $("np-playpause");
    if (playBtn) playBtn.textContent = state.isPlaying ? "Pause" : "Play";

    const shuffleBtn = $("np-shuffle");
    if (shuffleBtn) shuffleBtn.classList.toggle("active", state.shuffle);

    const repeatBtn = $("np-repeat");
    if (repeatBtn) {
      repeatBtn.classList.toggle("active", state.repeatMode !== "off");
      repeatBtn.textContent = repeatLabel();
    }

    updateProgress();
    renderLibrary();
  }

  // ---------------- Init ----------------
  initSettings();
  renderNowPlayingShell();
  refreshLibrary().catch(() => {
    showToast("Couldn't open your library (Private Browsing isn't supported)");
  });
})();
</script>
</body>
</html>
