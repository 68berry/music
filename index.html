<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>68 music app</title>
<style>
  :root {
    --bg: #121212;
    --surface: #1c1c1c;
    --surface-raised: #2a2a2a;
    --hairline: #323232;
    --text: #f0f0f0;
    --text-dim: #a0a0a0;
    --text-faint: #5e5e5e;
    --accent: #c8c8c8;
    --accent-soft: rgba(200,200,200,0.10);
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; margin: 0;
    background: var(--bg); color: var(--text);
    font-family: var(--mono);
    overscroll-behavior: none;
    transition: background-color 0.25s ease, color 0.25s ease;
  }
  body { display: flex; justify-content: center; }

  #app {
    width: 100%; max-width: 1024px; height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ── Panes ── */
  .pane {
    min-height: 0; overflow: hidden;
    display: flex; flex-direction: column;
  }

  #menu-pane {
    /* flex ratio set by JS; default 20 */
    min-height: 56px;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 0 18px;
    border-bottom: 1px solid var(--hairline);
  }

  #library-pane  { min-height: 60px; border-bottom: 1px solid var(--hairline); }
  #nowplay-pane  { min-height: 60px; justify-content: center; padding: 10px 26px; }

  /* ── Resize handles ── */
  .resize-handle {
    flex: 0 0 14px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    cursor: row-resize;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: none;
  }
  .resize-handle .grip { width: 40px; height: 3px; background: var(--hairline); }
  .resize-handle.dragging { background: var(--text); }
  .resize-handle.dragging .grip { background: var(--bg); }

  /* ── Win95 bevel buttons – no icons anywhere ── */
  .btn {
    appearance: none;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.50) rgba(0,0,0,0.50) rgba(0,0,0,0.50) rgba(255,255,255,0.50);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono); font-weight: 700;
    font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer; white-space: nowrap;
  }
  .btn:active, .btn.active {
    border-color: rgba(0,0,0,0.50) rgba(255,255,255,0.50) rgba(255,255,255,0.50) rgba(0,0,0,0.50);
    background: var(--surface-raised);
  }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.wide { min-width: 140px; }

  /* ── Library ── */
  #library { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  /* each row gets bevel border */
  .track-row {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    align-items: center; gap: 10px;
    padding: 9px 14px;
    margin: 4px 8px;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.40) rgba(0,0,0,0.40) rgba(0,0,0,0.40) rgba(255,255,255,0.40);
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: pan-y;
  }
  .track-row.current {
    background: var(--accent-soft);
    border-color: rgba(255,255,255,0.25) rgba(0,0,0,0.25) rgba(0,0,0,0.25) rgba(255,255,255,0.25);
  }
  .track-row.selected {
    background: var(--surface-raised);
    border-color: rgba(0,0,0,0.40) rgba(255,255,255,0.40) rgba(255,255,255,0.40) rgba(0,0,0,0.40);
  }

  .track-idx {
    font-size: 0.65rem; color: var(--text-faint);
    text-align: right; font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .track-row.current .track-idx { color: var(--text); font-weight: 700; }
  .track-row.selected .track-idx { color: var(--accent); font-weight: 700; }

  .track-title {
    font-size: 0.875rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-row.current .track-title { font-weight: 800; }

  .pill {
    font-size: 0.575rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text-dim); border: 1px solid var(--hairline); padding: 2px 5px;
  }
  .track-dur {
    font-size: 0.75rem; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .empty-state { padding: 10% 28px 0 28px; text-align: center; }
  .empty-state .line1 { font-size: 1rem; font-weight: 700; margin: 0 0 10px 0; }
  .empty-state .line2 { font-size: 0.8rem; color: var(--text-dim); line-height: 1.8; }

  /* ── Now Playing ── */
  .np-title-row { text-align: center; }
  .np-title {
    font-size: 1.0625rem; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Retro seek bar — pure CSS, no images */
  .seek-wrap { margin-top: 18px; }
  .seek-track {
    position: relative; width: 100%; height: 20px;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(0,0,0,0.55) rgba(255,255,255,0.35) rgba(255,255,255,0.35) rgba(0,0,0,0.55);
    cursor: pointer;
  }
  .seek-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--accent); opacity: 0.45;
    pointer-events: none;
  }
  .seek-thumb {
    position: absolute; top: 50%; width: 14px; height: 20px;
    background: var(--surface-raised);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.55) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.55);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .np-times {
    display: flex; justify-content: space-between;
    font-size: 0.6875rem; color: var(--text-dim);
    margin-top: 4px; letter-spacing: 0.02em;
  }

  .np-transport { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; }
  .np-transport .btn { min-width: 72px; }
  .np-transport .btn.playpause { min-width: 90px; }

  .np-modes { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
  .np-modes .btn { min-width: 96px; }

  .np-error { margin-top: 8px; font-size: 0.75rem; text-align: center; font-weight: 700; }

  /* ── Toast ── */
  #toast {
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top,0) + 10px);
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface-raised); border: 1px solid var(--hairline); color: var(--text);
    font-size: 0.75rem; padding: 9px 16px; max-width: 86%; text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease; z-index: 50;
  }
  #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  #file-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <section class="pane" id="menu-pane"><!-- rendered by JS --></section>

  <div class="resize-handle" id="handle-0"><div class="grip"></div></div>

  <section class="pane" id="library-pane">
    <div id="library"></div>
  </section>

  <div class="resize-handle" id="handle-1"><div class="grip"></div></div>

  <section class="pane" id="nowplay-pane">
    <div id="np-content"></div>
  </section>

  <input type="file" id="file-input" multiple
    accept="audio/*,.opus,.ogg,.flac,.m4a,.mp3,.wav,.aiff,.aac">
  <div id="toast"></div>
  <audio id="audio" preload="metadata"></audio>
</div>

<script>
(() => {
  "use strict";

  // ── IndexedDB ──────────────────────────────────────────────
  const DB_NAME = "music-app-68", DB_VER = 1, STORE = "tracks";

  function openDB() {
    return new Promise((res, rej) => {
      if (!window.indexedDB) { rej(new Error("No IndexedDB")); return; }
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = () => {
        if (!r.result.objectStoreNames.contains(STORE))
          r.result.createObjectStore(STORE, { keyPath: "id" });
      };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function dbPut(track) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(track);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  async function dbGetAll() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly");
      const r = tx.objectStore(STORE).getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = () => rej(r.error);
    });
  }
  async function dbDelete(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }

  // ── State ──────────────────────────────────────────────────
  const S = {
    tracks: [], queue: [], qIdx: -1,
    current: null, playing: false,
    repeat: "off",   // off | all | one
    shuffle: false,
    editMode: false, selected: new Set(),
    objURL: null,
    ratios: [20, 40, 40],  // menu, library, nowplay
    volume: 1, fontSize: 16, theme: 100,
  };

  const SETTINGS_KEY = "68-music-app-v1";
  const SUPPORTED = new Set(["opus","ogg","flac","m4a","mp3","wav","aiff","aac","caf"]);
  const PANE_MIN = 8, PANE_MAX = 72;

  // Grayscale palette – no hue anywhere
  const LIGHT = { bg:[250,250,250], sf:[238,238,238], sfr:[224,224,224], hl:[205,205,205], tx:[18,18,18], txd:[105,105,105], txf:[155,155,155], ac:[75,75,75] };
  const DARK  = { bg:[18,18,18], sf:[28,28,28], sfr:[42,42,42], hl:[52,52,52], tx:[240,240,240], txd:[155,155,155], txf:[95,95,95], ac:[200,200,200] };

  // ── DOM shortcuts ──────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const au = $("audio");
  const libEl  = $("library");
  const npEl   = $("np-content");
  const toastEl = $("toast");
  const fileIn  = $("file-input");
  const appEl   = $("app");
  const menuEl  = $("menu-pane");
  const panes   = [$("menu-pane"), $("library-pane"), $("nowplay-pane")];

  // ── Helpers ────────────────────────────────────────────────
  function uid() {
    return crypto.randomUUID ? crypto.randomUUID()
      : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }
  function fmt(s) {
    if (!isFinite(s) || s < 0) return "0:00";
    return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0");
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c=>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function toast(msg) {
    toastEl.textContent = msg; toastEl.classList.add("visible");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("visible"), 3000);
  }
  function titleFrom(name) { return name.replace(/\.[^.]+$/, ""); }

  // ── Settings persist ───────────────────────────────────────
  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        volume: S.volume, fontSize: S.fontSize, theme: S.theme, ratios: S.ratios
      }));
    } catch(e) {}
  }
  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.volume != null) S.volume = d.volume;
      if (d.fontSize != null) S.fontSize = d.fontSize;
      if (d.theme != null) S.theme = d.theme;
      if (Array.isArray(d.ratios) && d.ratios.length === 3) S.ratios = d.ratios;
    } catch(e) {}
  }

  function lerp(a,b,t) { return Math.round(a+(b-a)*t); }
  function lerpC(c1,c2,t) {
    return `rgb(${lerp(c1[0],c2[0],t)},${lerp(c1[1],c2[1],t)},${lerp(c1[2],c2[2],t)})`;
  }

  function applyTheme(pct) {
    const t = pct/100;
    const r = document.documentElement.style;
    r.setProperty("--bg",   lerpC(LIGHT.bg, DARK.bg, t));
    r.setProperty("--surface", lerpC(LIGHT.sf, DARK.sf, t));
    r.setProperty("--surface-raised", lerpC(LIGHT.sfr, DARK.sfr, t));
    r.setProperty("--hairline", lerpC(LIGHT.hl, DARK.hl, t));
    r.setProperty("--text", lerpC(LIGHT.tx, DARK.tx, t));
    r.setProperty("--text-dim",   lerpC(LIGHT.txd, DARK.txd, t));
    r.setProperty("--text-faint", lerpC(LIGHT.txf, DARK.txf, t));
    r.setProperty("--accent", lerpC(LIGHT.ac, DARK.ac, t));
  }
  function applyFontSize(px) {
    document.documentElement.style.fontSize = px + "px";
  }
  function applyVolume(v) { au.volume = v; }

  function applyAllSettings() {
    applyTheme(S.theme);
    applyFontSize(S.fontSize);
    applyVolume(S.volume);
    applyPaneRatios();
  }
  function applyPaneRatios() {
    panes.forEach((el,i) => {
      el.style.flexGrow = S.ratios[i];
      el.style.flexShrink = 1;
      el.style.flexBasis = "0%";
    });
  }

  // ── Resize handles ─────────────────────────────────────────
  function setupHandle(handleEl, ai, bi) {
    const LP = 450;
    let drag=false, startY=0, startR=null, timer=null;

    function end() {
      drag=false; handleEl.classList.remove("dragging"); saveSettings();
    }
    handleEl.addEventListener("pointerdown", e => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        drag=true; startY=e.clientY; startR=S.ratios.slice();
        handleEl.classList.add("dragging");
        try { handleEl.setPointerCapture(e.pointerId); } catch(_) {}
      }, LP);
    });
    handleEl.addEventListener("pointermove", e => {
      if (!drag) return; e.preventDefault();
      let d = (e.clientY - startY) / (appEl.clientHeight||1) * 100;
      d = Math.max(d, PANE_MIN - startR[ai]);
      d = Math.min(d, PANE_MAX - startR[ai]);
      d = Math.min(d, startR[bi] - PANE_MIN);
      d = Math.max(d, startR[bi] - PANE_MAX);
      S.ratios[ai] = startR[ai]+d; S.ratios[bi] = startR[bi]-d;
      applyPaneRatios();
    });
    handleEl.addEventListener("pointerup",     () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointercancel", () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointerleave",  () => { if(!drag) clearTimeout(timer); });
  }
  setupHandle($("handle-0"), 0, 1);
  setupHandle($("handle-1"), 1, 2);

  // ── Menu pane rendering ────────────────────────────────────
  function renderMenu() {
    if (S.editMode) {
      const n = S.selected.size, total = S.tracks.length;
      menuEl.innerHTML = `
        <button class="btn" id="m-count">${n} / ${total} Selected</button>
        <button class="btn"${n===0?" disabled":""} id="m-delete">Delete ${n} / ${total}</button>
        <button class="btn" id="m-cancel">Cancel</button>`;
    } else {
      menuEl.innerHTML = `
        <button class="btn wide" id="m-add">Add Track</button>
        <button class="btn wide" id="m-settings">&#x2190; Settings &#x2192;</button>`;
    }
  }

  menuEl.addEventListener("click", e => {
    if (e.target.closest("#m-add"))      { fileIn.click(); return; }
    if (e.target.closest("#m-settings")) { toast("Settings screen coming soon."); return; }
    if (e.target.closest("#m-delete"))   { deleteSelected(); return; }
    if (e.target.closest("#m-cancel"))   { cancelSelection(); return; }
  });

  // ── Selection mode ─────────────────────────────────────────
  function enterSelectionMode(id) {
    S.editMode = true;
    S.selected.add(id);
    renderMenu();
    renderLib();
  }
  function toggleSel(id) {
    if (S.selected.has(id)) S.selected.delete(id);
    else S.selected.add(id);
    renderMenu();
    renderLib();
  }
  function cancelSelection() {
    S.editMode = false; S.selected.clear();
    renderMenu(); renderLib();
  }
  async function deleteSelected() {
    const ids = Array.from(S.selected);
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} track${ids.length>1?"s":""}?`)) return;
    for (const id of ids) {
      await dbDelete(id);
      if (S.current && S.current.id === id) stopPlayback();
    }
    S.editMode = false; S.selected.clear();
    renderMenu();
    await refreshLib();
  }

  // ── Import ─────────────────────────────────────────────────
  fileIn.addEventListener("change", async e => {
    const files = Array.from(e.target.files||[]);
    let n = 0;
    for (const f of files) {
      const ext = (f.name.split(".").pop()||"").toLowerCase();
      if (!SUPPORTED.has(ext)) continue;
      const track = {
        id: uid(), title: titleFrom(f.name), duration: 0,
        fileName: f.name, extension: ext, mimeType: f.type||"",
        blob: f, addedAt: Date.now(), playCount: 0,
      };
      try { await dbPut(track); n++; } catch(_) { toast(`Couldn't save "${f.name}"`); }
    }
    fileIn.value = "";
    toast(n===0 ? "No supported audio files found" : `${n} track${n>1?"s":""} added`);
    await refreshLib();
  });

  // ── Library ────────────────────────────────────────────────
  async function refreshLib() {
    try { S.tracks = await dbGetAll(); }
    catch(_) { toast("Couldn't load library"); S.tracks = []; }
    S.tracks.sort((a,b) => a.title.localeCompare(b.title));
    renderLib();
  }

  function renderLib() {
    if (S.tracks.length === 0) {
      libEl.innerHTML = `
        <div class="empty-state">
          <div class="line1">Bop bop just feel the music</div>
          <div class="line2">AAC/M4A &nbsp;/&nbsp; AIFF &nbsp;/&nbsp; FLAC &nbsp;/&nbsp; MP3 &nbsp;/&nbsp; Opus &nbsp;/&nbsp; WAV</div>
        </div>`;
      return;
    }
    libEl.innerHTML = S.tracks.map((t,i) => {
      const isCur = S.current && S.current.id === t.id;
      const isSel = S.selected.has(t.id);
      const idx   = S.editMode
        ? (isSel ? "[SEL]" : "[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;]")
        : (isCur ? "&gt;&gt;&gt;&gt;" : String(i+1).padStart(4,"0"));
      const cls   = ["track-row", isCur?"current":"", isSel?"selected":""].filter(Boolean).join(" ");
      const pill  = t.extension==="opus" ? `<span class="pill">OPUS</span>` : `<span></span>`;
      return `
        <div class="${cls}" data-id="${t.id}">
          <div class="track-idx">${idx}</div>
          <div class="track-title">${esc(t.title)}</div>
          ${pill}
          <div class="track-dur">${t.duration ? fmt(t.duration) : "--:--"}</div>
        </div>`;
    }).join("");
  }

  // ── Library gesture: long-press to enter selection mode ────
  const LP_MS = 450, MOVE_PX = 8;
  let G = null;

  libEl.addEventListener("pointerdown", e => {
    const row = e.target.closest(".track-row");
    if (!row) return;
    G = {
      id: row.getAttribute("data-id"),
      pid: e.pointerId,
      x0: e.clientX, y0: e.clientY,
      moved: false, fired: false, timer: null
    };
    G.timer = setTimeout(() => {
      if (!G || G.moved) return;
      G.fired = true;
      if (S.editMode) toggleSel(G.id);
      else enterSelectionMode(G.id);
    }, LP_MS);
  });

  libEl.addEventListener("pointermove", e => {
    if (!G || G.pid !== e.pointerId) return;
    const dx = e.clientX - G.x0, dy = e.clientY - G.y0;
    if (!G.moved && (Math.abs(dx)>MOVE_PX || Math.abs(dy)>MOVE_PX)) {
      G.moved = true; clearTimeout(G.timer);
    }
  });

  libEl.addEventListener("pointerup", e => {
    if (!G || G.pid !== e.pointerId) { G=null; return; }
    clearTimeout(G.timer);
    if (!G.fired) {
      if (S.editMode) toggleSel(G.id);
      else {
        const idx = S.tracks.findIndex(t => t.id === G.id);
        if (idx >= 0) playQueueAt(S.tracks, idx);
      }
    }
    G = null;
  });

  libEl.addEventListener("pointercancel", () => {
    if (G) clearTimeout(G.timer); G = null;
  });

  // ── Now Playing rendering ──────────────────────────────────
  function renderNP() {
    const t = S.current;
    if (!t) { npEl.innerHTML = ""; return; }

    npEl.innerHTML = `
      <div class="np-title-row">
        <div class="np-title" id="np-title">${esc(t.title)}</div>
      </div>

      <div class="seek-wrap">
        <div class="seek-track" id="seek-track">
          <div class="seek-fill" id="seek-fill" style="width:0%"></div>
          <div class="seek-thumb" id="seek-thumb" style="left:0%"></div>
        </div>
        <div class="np-times">
          <span id="np-cur">0:00</span>
          <span id="np-dur">0:00</span>
        </div>
      </div>

      <div class="np-transport">
        <button class="btn" id="np-prev">Prev</button>
        <button class="btn playpause" id="np-play">Play</button>
        <button class="btn" id="np-next">Next</button>
      </div>

      <div class="np-modes">
        <button class="btn" id="np-shuf">Shuffle</button>
        <button class="btn" id="np-rep">Repeat Off</button>
      </div>

      <div class="np-error" id="np-err"></div>`;

    // seek bar interaction (pointer events on the track element)
    const seekTrack = $("seek-track");
    function seekByPointer(e) {
      const r = seekTrack.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      const d = au.duration && isFinite(au.duration) ? au.duration : (S.current ? S.current.duration : 0);
      au.currentTime = pct * d;
      updateSeekBar(pct);
    }
    let seekDrag = false;
    seekTrack.addEventListener("pointerdown", e => {
      seekDrag = true;
      seekTrack.setPointerCapture(e.pointerId);
      seekByPointer(e);
    });
    seekTrack.addEventListener("pointermove", e => { if (seekDrag) seekByPointer(e); });
    seekTrack.addEventListener("pointerup",   e => { if (seekDrag) { seekDrag=false; seekByPointer(e); } });
    seekTrack.addEventListener("pointercancel", () => { seekDrag = false; });

    $("np-prev").addEventListener("click", prev);
    $("np-play").addEventListener("click", togglePlay);
    $("np-next").addEventListener("click", next);
    $("np-shuf").addEventListener("click", () => { S.shuffle=!S.shuffle; updateAll(); });
    $("np-rep").addEventListener("click", () => {
      S.repeat = S.repeat==="off"?"all":S.repeat==="all"?"one":"off";
      updateAll();
    });

    updateAll();
  }

  // ── Retro seek bar update ──────────────────────────────────
  function updateSeekBar(pct) {
    const fill  = $("seek-fill");
    const thumb = $("seek-thumb");
    if (!fill || !thumb) return;
    const p = (pct*100).toFixed(2) + "%";
    fill.style.width = p;
    thumb.style.left = p;
  }

  // ── Playback ───────────────────────────────────────────────
  function playQueueAt(tracks, idx) {
    S.queue = tracks; S.qIdx = idx;
    loadAndPlay(tracks[idx]);
  }

  function loadAndPlay(track) {
    if (S.objURL) URL.revokeObjectURL(S.objURL);
    const url = URL.createObjectURL(track.blob);
    S.objURL = url;
    const isNew = !S.current || S.current.id !== track.id;
    S.current = track;
    au.src = url;
    if (isNew) renderNP();
    else { const e=$("np-err"); if(e) e.textContent=""; }

    au.play().then(() => {
      S.playing = true;
      track.playCount = (track.playCount||0)+1;
      dbPut(track).catch(()=>{});
      updateAll();
    }).catch(err => {
      S.playing = false;
      const e=$("np-err");
      if(e) e.textContent = `Can't play: ${err.message||"unsupported format"}`;
      updateAll();
    });
    updateMediaSession(track);
    updateAll();
  }

  function stopPlayback() {
    au.pause(); au.removeAttribute("src"); au.load();
    if (S.objURL) { URL.revokeObjectURL(S.objURL); S.objURL=null; }
    S.current=null; S.playing=false; S.queue=[]; S.qIdx=-1;
    renderNP(); updateAll();
  }

  function togglePlay() {
    if (!S.current) return;
    if (au.paused) au.play().then(()=>{ S.playing=true; updateAll(); }).catch(()=>{});
    else { au.pause(); S.playing=false; updateAll(); }
  }

  function advance(dir) {
    if (!S.queue.length) return;
    let idx = S.shuffle ? Math.floor(Math.random()*S.queue.length) : S.qIdx+dir;
    if (idx < 0) { if(S.repeat==="all") idx=S.queue.length-1; else { au.pause();S.playing=false;updateAll();return; } }
    else if (idx>=S.queue.length) { if(S.repeat==="all") idx=0; else { au.pause();S.playing=false;updateAll();return; } }
    S.qIdx=idx; loadAndPlay(S.queue[idx]);
  }
  function next() { advance(1); }
  function prev() { if(au.currentTime>3){au.currentTime=0;return;} advance(-1); }

  au.addEventListener("ended", () => {
    if (S.repeat==="one" && S.current) { loadAndPlay(S.current); return; }
    next();
  });

  au.addEventListener("timeupdate", () => {
    const dur = au.duration && isFinite(au.duration) ? au.duration : (S.current ? S.current.duration : 0);
    const cur = au.currentTime || 0;
    const pct = dur > 0 ? cur/dur : 0;
    updateSeekBar(pct);
    const ce=$("np-cur"), de=$("np-dur");
    if(ce) ce.textContent = fmt(cur);
    if(de) de.textContent = fmt(dur);
  });

  au.addEventListener("durationchange", () => {
    if (S.current && au.duration && isFinite(au.duration) && !S.current.duration) {
      S.current.duration = au.duration;
      dbPut(S.current).catch(()=>{});
      renderLib();
    }
  });

  au.addEventListener("error", () => {
    const e=$("np-err");
    if(e) e.textContent="Can't play this file (unsupported format)";
    S.playing=false; updateAll();
  });

  // ── MediaSession ───────────────────────────────────────────
  function updateMediaSession(t) {
    if (!navigator.mediaSession) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: t.title });
    navigator.mediaSession.setActionHandler("play",  ()=>{ au.play();S.playing=true;updateAll(); });
    navigator.mediaSession.setActionHandler("pause", ()=>{ au.pause();S.playing=false;updateAll(); });
    navigator.mediaSession.setActionHandler("previoustrack", prev);
    navigator.mediaSession.setActionHandler("nexttrack",     next);
    navigator.mediaSession.setActionHandler("seekto", d=>{ if(d.seekTime!=null) au.currentTime=d.seekTime; });
  }

  // ── UI sync ────────────────────────────────────────────────
  function updateAll() {
    const pb=$("np-play"); if(pb) pb.textContent = S.playing?"Pause":"Play";
    const sh=$("np-shuf"); if(sh) sh.classList.toggle("active", S.shuffle);
    const rp=$("np-rep");
    if(rp) {
      rp.classList.toggle("active", S.repeat!=="off");
      rp.textContent = S.repeat==="one"?"Repeat One":S.repeat==="all"?"Repeat All":"Repeat Off";
    }
    renderLib();
  }

  // ── Init ───────────────────────────────────────────────────
  loadSettings();
  applyAllSettings();
  renderMenu();
  renderNP();
  refreshLib().catch(() => toast("Couldn't open library (Private Browsing isn't supported)"));
})();
</script>
</body>
</html>
