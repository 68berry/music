<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>68 music app</title>
<style>
  :root {
    --bg: #121212;
    --surface: #1c1c1c;
    --surface-raised: #2a2a2a;
    --hairline: #323232;
    --text: #f0f0f0;
    --text-dim: #a0a0a0;
    --text-faint: #5e5e5e;
    --accent: #c8c8c8;
    --accent-soft: rgba(200,200,200,0.10);
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; margin: 0;
    background: var(--bg); color: var(--text);
    font-family: var(--mono);
    overscroll-behavior: none;
  }
  body { display: flex; justify-content: center; overflow: hidden; }

  #app {
    width: 100%; max-width: 1024px; height: 100dvh;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* ── Panes ── */
  .pane { min-height: 0; overflow: hidden; display: flex; flex-direction: column; }

  #menu-pane {
    min-height: 64px;
    flex-direction: column; align-items: flex-start; justify-content: center;
    padding: 8px 14px 10px;
    border-bottom: 1px solid var(--hairline);
    gap: 8px;
  }

  /* very berry player title — plain text link, 13px=10pt fixed, unaffected by size slider */
  .menu-title-link {
    font-size: 13px;
    text-decoration: none; color: var(--text);
    cursor: pointer; letter-spacing: 0.02em;
    -webkit-user-select: none; user-select: none;
    width: 100%; text-align: right;
  }
  .menu-buttons {
    display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%;
  }

  #library-pane  { min-height: 60px; border-bottom: 1px solid var(--hairline); }
  #nowplay-pane  { min-height: 60px; justify-content: center; padding: 10px 26px; }

  /* ── Resize handles ── */
  .resize-handle {
    flex: 0 0 14px; display: flex; align-items: center; justify-content: center;
    background: var(--bg); cursor: row-resize;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: none;
  }
  .resize-handle .grip { width: 40px; height: 3px; background: var(--hairline); }
  .resize-handle.dragging { background: var(--text); }
  .resize-handle.dragging .grip { background: var(--bg); }

  /* ── Bevel buttons (Win95 / terminal style, no icons) ── */
  .btn {
    appearance: none;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.50) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.50);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono); font-weight: 700;
    font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer; white-space: nowrap;
    transition: none;
  }
  .btn:active, .btn.active {
    border-color: rgba(0,0,0,0.55) rgba(255,255,255,0.50) rgba(255,255,255,0.50) rgba(0,0,0,0.55);
    background: var(--surface-raised);
  }
  .btn:disabled, .btn-dim { opacity: 0.32; cursor: default; }
  .btn.wide { min-width: 140px; }

  /* ── Library ── */
  #library { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 6px 8px 6px; }

  .track-row {
    display: grid; grid-template-columns: 48px 1fr auto auto;
    align-items: center; gap: 10px;
    padding: 9px 12px;
    margin-bottom: 4px;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.40) rgba(0,0,0,0.40) rgba(0,0,0,0.40) rgba(255,255,255,0.40);
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: pan-y;
  }
  .track-row.current {
    background: var(--accent-soft);
  }
  .track-row.selected {
    background: var(--surface-raised);
    border-color: rgba(0,0,0,0.50) rgba(255,255,255,0.45) rgba(255,255,255,0.45) rgba(0,0,0,0.50);
  }

  .track-idx {
    font-size: 0.65rem; color: var(--text-faint);
    text-align: right; font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }
  .track-row.current .track-idx { color: var(--text); font-weight: 700; }
  .track-row.selected .track-idx { color: var(--accent); font-weight: 700; }

  .track-title {
    font-size: 0.875rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-row.current .track-title { font-weight: 800; }

  .pill {
    font-size: 0.575rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text-dim); border: 1px solid var(--hairline); padding: 2px 5px;
  }
  .track-dur { font-size: 0.75rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .empty-state { padding: 10% 28px 0; text-align: center; }
  .empty-state .line1 { font-size: 1rem; font-weight: 700; margin: 0 0 10px; }
  .empty-formats {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    margin-top: 6px;
  }

  /* ── Now Playing ── */
  .np-title-row { text-align: center; }
  .np-title { font-size: 1.0625rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Retro seek bar — pure CSS, no images, pointer-driven */
  .seek-wrap { margin-top: 16px; }
  .seek-track {
    position: relative; width: 100%; height: 20px;
    background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(0,0,0,0.55) rgba(255,255,255,0.40) rgba(255,255,255,0.40) rgba(0,0,0,0.55);
    cursor: pointer;
  }
  .seek-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.40; pointer-events: none; }
  .seek-thumb {
    position: absolute; top: 50%; width: 14px; height: 22px;
    background: var(--surface-raised);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.55) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.55);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  .np-times { display: flex; justify-content: space-between; font-size: 0.6875rem; color: var(--text-dim); margin-top: 4px; }

  .np-transport { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; }
  .np-transport .btn { min-width: 72px; }
  .np-transport .btn.playpause { min-width: 90px; }
  .np-modes { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
  .np-modes .btn { min-width: 96px; }
  .np-error { margin-top: 8px; font-size: 0.75rem; text-align: center; font-weight: 700; }

  /* ── Settings screen overlay ── */
  #settings-screen {
    position: fixed; inset: 0; z-index: 100;
    /* Colors overridden per-element by JS (inverted theme) */
    background: var(--bg); color: var(--text);
    font-family: var(--mono);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.30s cubic-bezier(0.32, 0.72, 0, 1);
    overflow: hidden;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  #settings-screen.open { transform: translateX(0); }

  /* Settings top pane — 20%, left GitHub + centered Back */
  .s-top {
    min-height: 64px;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    padding: 8px 14px 10px; gap: 8px;
    border-bottom: 1px solid var(--hairline);
  }
  .s-back-row { display: flex; width: 100%; justify-content: center; }

  /* Settings mid pane — scrollable sliders */
  .s-mid {
    min-height: 60px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    border-bottom: 1px solid var(--hairline);
    padding: 18px 20px;
  }

  /* Settings bottom pane — intentionally empty */
  .s-bot { min-height: 60px; }

  .s-item { margin-bottom: 22px; }
  .s-item:last-child { margin-bottom: 0; }
  .s-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text); margin-bottom: 8px;
  }
  .s-label .s-val { font-weight: 400; letter-spacing: 0.02em; color: var(--text-dim); }

  /* Retro slider — bevel groove + square thumb */
  .s-range {
    -webkit-appearance: none; display: block; width: 100%;
    height: 20px; background: var(--surface);
    border-style: solid; border-width: 2px;
    border-color: rgba(0,0,0,0.55) rgba(255,255,255,0.40) rgba(255,255,255,0.40) rgba(0,0,0,0.55);
    border-radius: 0; cursor: pointer; outline: none;
  }
  .s-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 26px;
    background: var(--surface-raised);
    border-style: solid; border-width: 2px;
    border-color: rgba(255,255,255,0.55) rgba(0,0,0,0.55) rgba(0,0,0,0.55) rgba(255,255,255,0.55);
    border-radius: 0; cursor: pointer;
  }

  /* ── Toast ── */
  #toast {
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top,0) + 10px);
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface-raised); border: 1px solid var(--hairline); color: var(--text);
    font-size: 0.75rem; padding: 9px 16px; max-width: 86%; text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease; z-index: 200;
  }
  #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  #file-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <section class="pane" id="menu-pane"><!-- rendered by JS --></section>

  <div class="resize-handle" id="handle-0"><div class="grip"></div></div>

  <section class="pane" id="library-pane">
    <div id="library"></div>
  </section>

  <div class="resize-handle" id="handle-1"><div class="grip"></div></div>

  <section class="pane" id="nowplay-pane">
    <div id="np-content"></div>
  </section>

</div>

<!-- Settings screen overlay (outside #app so CSS var scope is independent) -->
<div id="settings-screen">

  <div class="s-top" id="s-top">
    <a class="menu-title-link" id="s-github" href="https://github.com/68berry/music"
       target="_blank" rel="noopener noreferrer">very berry player&#x1F353;&#x1FAD0;</a>
    <div class="s-back-row">
      <button class="btn" id="s-close">&#x2190; SWIPE &#x2192; TO RETURN</button>
    </div>
  </div>

  <div class="resize-handle" id="s-handle-0"><div class="grip"></div></div>

  <div class="s-mid" id="s-mid">
    <div class="s-item">
      <div class="s-label">Volume</div>
      <input class="s-range" type="range" id="s-vol" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="s-item">
      <div class="s-label">Size &nbsp;<span class="s-val" id="s-fs-val">16PX / 12.0PT / 1.00REM</span></div>
      <input class="s-range" type="range" id="s-fs" min="8" max="40" step="1" value="16">
    </div>
    <div class="s-item">
      <div class="s-label">Theme</div>
      <input class="s-range" type="range" id="s-theme" min="0" max="100" step="1" value="100">
    </div>
  </div>

  <div class="resize-handle" id="s-handle-1"><div class="grip"></div></div>

  <div class="s-bot" id="s-bot"></div>

</div>

<input type="file" id="file-input" multiple accept="audio/*,.opus,.ogg,.flac,.m4a,.mp3,.wav,.aiff,.aac">
<div id="toast"></div>
<audio id="audio" preload="metadata"></audio>

<script>
(() => {
  "use strict";

  // ── IndexedDB ──────────────────────────────────────────────
  const DB_NAME = "music-app-68", DB_VER = 1, STORE = "tracks";

  function openDB() {
    return new Promise((res, rej) => {
      if (!window.indexedDB) { rej(new Error("No IndexedDB")); return; }
      const r = indexedDB.open(DB_NAME, DB_VER);
      r.onupgradeneeded = () => {
        if (!r.result.objectStoreNames.contains(STORE))
          r.result.createObjectStore(STORE, { keyPath: "id" });
      };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function dbPut(t) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(t);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  async function dbGetAll() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly");
      const r = tx.objectStore(STORE).getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = () => rej(r.error);
    });
  }
  async function dbDelete(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }

  // ── State ──────────────────────────────────────────────────
  const S = {
    tracks: [], queue: [], qIdx: -1,
    current: null, playing: false,
    repeat: "off", shuffle: false,
    editMode: false, selected: new Set(),
    objURL: null,
    ratios: [20, 40, 40],
    volume: 1, fontSize: 16, theme: 100,
    settingsOpen: false,
  };

  const SETTINGS_KEY = "68-music-app-v1";
  const SUPPORTED = new Set(["opus","ogg","flac","m4a","mp3","wav","aiff","aac","caf"]);
  const PANE_MIN = 8, PANE_MAX = 72;

  // ── DOM ────────────────────────────────────────────────────
  const $   = id => document.getElementById(id);
  const au  = $("audio");
  const libEl  = $("library");
  const npEl   = $("np-content");
  const toastEl = $("toast");
  const fileIn  = $("file-input");
  const appEl   = $("app");
  const menuEl  = $("menu-pane");
  const settingsScreen = $("settings-screen");
  const panes = [$("menu-pane"), $("library-pane"), $("nowplay-pane")];

  // ── Helpers ────────────────────────────────────────────────
  function uid() {
    return crypto.randomUUID ? crypto.randomUUID()
      : "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }
  function fmt(s) {
    if (!isFinite(s) || s < 0) return "0:00";
    return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0");
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("visible");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("visible"), 3000);
  }
  function titleFrom(name) { return name.replace(/\.[^.]+$/, ""); }
  function pad4(n) { return String(n).padStart(4,"0"); }

  // ── Theme / contrast ───────────────────────────────────────
  // Key fix: text color uses a binary flip at bg mid-point (≈135)
  // so it NEVER lands in the gray-on-gray zone.
  function lround(a, b, t) { return Math.round(a + (b - a) * Math.max(0, Math.min(1, t))); }

  function computeVars(t) {
    // t=0 → light (white),  t=1 → dark (black)
    const bg  = lround(250, 18, t);
    const sf  = lround(240, 28, t);
    const sfr = lround(228, 42, t);
    const hl  = lround(210, 52, t);

    // Binary flip: bg < 135 → dark bg, use light text; bg ≥ 135 → light bg, use dark text
    const darkBg = bg < 135;
    const tx  = darkBg ? lround(198, 240, (t - 0.5) * 2)
                       : lround(20,  76, t * 2);
    const txd = darkBg ? lround(142, 165, (t - 0.5) * 2)
                       : lround(80,  112, t * 2);
    const txf = darkBg ? 105 : 143;
    const ac  = darkBg ? lround(188, 210, (t - 0.5) * 2)
                       : lround(60,  88,  t * 2);
    const g = v => `rgb(${v},${v},${v})`;
    return {
      "--bg": g(bg), "--surface": g(sf), "--surface-raised": g(sfr),
      "--hairline": g(hl), "--text": g(tx), "--text-dim": g(txd),
      "--text-faint": g(txf), "--accent": g(ac),
      "--accent-soft": `rgba(${ac},${ac},${ac},0.12)`,
    };
  }

  function applyVars(el, vars) {
    for (const [k, v] of Object.entries(vars)) el.style.setProperty(k, v);
  }

  function applyTheme(pct) {
    S.theme = pct;
    const t = pct / 100;
    applyVars(document.documentElement, computeVars(t));
    // Settings screen uses inverted t → visually opposite bg
    applyVars(settingsScreen, computeVars(1 - t));
  }

  function applyFontSize(px) {
    S.fontSize = px;
    document.documentElement.style.fontSize = px + "px";
    const pt  = (px * 0.75).toFixed(1);
    const rem = (px / 16).toFixed(2);
    const el = $("s-fs-val");
    if (el) el.textContent = `${px}PX / ${pt}PT / ${rem}REM`;
  }

  function applyVolume(v) { S.volume = v; au.volume = v; }

  // ── Settings persist ───────────────────────────────────────
  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        volume: S.volume, fontSize: S.fontSize, theme: S.theme,
        ratios: S.ratios, sRatios: S.sRatios,
      }));
    } catch(_) {}
  }
  function loadSettings() {
    try {
      const d = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
      if (d.volume   != null) S.volume   = d.volume;
      if (d.fontSize != null) S.fontSize = d.fontSize;
      if (d.theme    != null) S.theme    = d.theme;
      if (Array.isArray(d.ratios)  && d.ratios.length  === 3) S.ratios  = d.ratios;
      if (Array.isArray(d.sRatios) && d.sRatios.length === 3) S.sRatios = d.sRatios;
    } catch(_) {}
  }

  // Sync settings screen slider positions to current state
  function syncSettingsSliders() {
    const vol = $("s-vol"); if (vol) vol.value = S.volume;
    const fs  = $("s-fs");  if (fs)  fs.value  = S.fontSize;
    const th  = $("s-theme"); if (th) th.value = S.theme;
    applyFontSize(S.fontSize); // refresh label
  }

  // Settings sliders
  $("s-vol").addEventListener("input", e => { applyVolume(parseFloat(e.target.value)); saveSettings(); });
  $("s-fs").addEventListener("input", e => { applyFontSize(parseInt(e.target.value,10)); saveSettings(); });
  $("s-theme").addEventListener("input", e => { applyTheme(parseInt(e.target.value,10)); saveSettings(); });

  // ── Settings screen open / close ───────────────────────────
  function openSettings() {
    S.settingsOpen = true;
    settingsScreen.classList.add("open");
    applySettingsPaneRatios();
    syncSettingsSliders();
  }
  function closeSettings() {
    S.settingsOpen = false;
    settingsScreen.classList.remove("open");
  }

  $("s-close").addEventListener("click", closeSettings);

  // ── Settings pane resize (independent of main pane ratios) ─
  S.sRatios = [20, 40, 40];

  function applySettingsPaneRatios() {
    [[$("s-top"),0], [$("s-mid"),1], [$("s-bot"),2]].forEach(([el,i]) => {
      if (!el) return;
      el.style.flexGrow   = S.sRatios[i];
      el.style.flexShrink = 1;
      el.style.flexBasis  = "0%";
    });
  }

  function setupSettingsHandle(handleEl, ai, bi) {
    const LP = 450;
    let drag=false, startY=0, startR=null, timer=null;
    function end() { drag=false; handleEl.classList.remove("dragging"); saveSettings(); }
    handleEl.addEventListener("pointerdown", e => {
      clearTimeout(timer);
      // Capture immediately (synchronous) — async capture inside setTimeout is dropped by iOS Safari
      try { handleEl.setPointerCapture(e.pointerId); } catch(_) {}
      const iy = e.clientY;
      timer = setTimeout(() => {
        drag=true; startY=iy; startR=S.sRatios.slice();
        handleEl.classList.add("dragging");
      }, LP);
    });
    handleEl.addEventListener("pointermove", e => {
      if (!drag) return; e.preventDefault();
      const h = settingsScreen.clientHeight || appEl.clientHeight || 1;
      let d = (e.clientY - startY) / h * 100;
      d = Math.max(d, PANE_MIN - startR[ai]);
      d = Math.min(d, PANE_MAX - startR[ai], startR[bi] - PANE_MIN);
      d = Math.max(d, startR[bi] - PANE_MAX);
      S.sRatios[ai] = startR[ai]+d; S.sRatios[bi] = startR[bi]-d;
      applySettingsPaneRatios();
    });
    handleEl.addEventListener("pointerup",     () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointercancel", () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointerleave",  () => { if(!drag) clearTimeout(timer); });
  }
  setupSettingsHandle($("s-handle-0"), 0, 1);
  setupSettingsHandle($("s-handle-1"), 1, 2);

  // ── Global horizontal swipe → toggle settings ─────────────
  // Ignores: text selection / copy toolbar, range sliders, resize handles,
  // vertical scroll, gestures that are too slow or too fast.
  let SW = null;

  document.addEventListener("touchstart", e => {
    if (e.touches.length !== 1)                                                { SW = null; return; }
    if (e.target.closest('input[type="range"]'))                               { SW = null; return; }
    if (e.target.closest(".resize-handle"))                                    { SW = null; return; }
    if (window.getSelection && window.getSelection().toString().length > 0)    { SW = null; return; }
    SW = { x0: e.touches[0].clientX, y0: e.touches[0].clientY, t0: Date.now(), cancelled: false };
  }, { passive: true });

  document.addEventListener("touchmove", e => {
    if (!SW || SW.cancelled) return;
    const dx = Math.abs(e.touches[0].clientX - SW.x0);
    const dy = Math.abs(e.touches[0].clientY - SW.y0);
    if (dy > 14 && dy > dx * 1.1) SW.cancelled = true; // vertical scroll → cancel
  }, { passive: true });

  document.addEventListener("touchend", e => {
    if (!SW || SW.cancelled) { SW = null; return; }
    const dx = e.changedTouches[0].clientX - SW.x0;
    const dy = Math.abs(e.changedTouches[0].clientY - SW.y0);
    const dt = Date.now() - SW.t0;
    SW = null;
    if (Math.abs(dx) < 72)       return; // too short
    if (Math.abs(dx) < dy * 2.2) return; // not horizontal enough
    if (dt < 60 || dt > 700)     return; // too fast (tap) or too slow (long-press/text-select)
    if (window.getSelection && window.getSelection().toString().length > 0) return;
    if (S.settingsOpen) closeSettings(); else openSettings();
  }, { passive: true });

  // ── Pane resize handles ────────────────────────────────────
  function setupHandle(handleEl, ai, bi) {
    const LP = 450;
    let drag=false, startY=0, startR=null, timer=null;
    function end() { drag=false; handleEl.classList.remove("dragging"); saveSettings(); }
    handleEl.addEventListener("pointerdown", e => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        drag=true; startY=e.clientY; startR=S.ratios.slice();
        handleEl.classList.add("dragging");
        try { handleEl.setPointerCapture(e.pointerId); } catch(_) {}
      }, LP);
    });
    handleEl.addEventListener("pointermove", e => {
      if (!drag) return; e.preventDefault();
      let d = (e.clientY - startY) / (appEl.clientHeight||1) * 100;
      d = Math.max(d, PANE_MIN - startR[ai]);
      d = Math.min(d, PANE_MAX - startR[ai], startR[bi] - PANE_MIN);
      d = Math.max(d, startR[bi] - PANE_MAX);
      S.ratios[ai] = startR[ai]+d; S.ratios[bi] = startR[bi]-d;
      applyPaneRatios();
    });
    handleEl.addEventListener("pointerup",     () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointercancel", () => { clearTimeout(timer); if(drag) end(); });
    handleEl.addEventListener("pointerleave",  () => { if(!drag) clearTimeout(timer); });
  }
  setupHandle($("handle-0"), 0, 1);
  setupHandle($("handle-1"), 1, 2);

  function applyPaneRatios() {
    panes.forEach((el,i) => {
      el.style.flexGrow = S.ratios[i];
      el.style.flexShrink = 1;
      el.style.flexBasis = "0%";
    });
  }

  // ── Menu pane ──────────────────────────────────────────────
  function renderMenu() {
    const title = `<a class="menu-title-link" href="https://github.com/68berry/music" target="_blank" rel="noopener noreferrer">very berry player&#x1F353;&#x1FAD0;</a>`;
    if (S.editMode) {
      const n = S.selected.size, tot = S.tracks.length;
      const allSel = n === tot && tot > 0;
      menuEl.innerHTML = `
        ${title}
        <div class="menu-buttons">
          <button class="btn${allSel ? " active" : ""}" id="m-count">${n}</button>
          <button class="btn${n===0?" btn-dim":""}" id="m-delete">Delete ${n} / ${tot}</button>
          <button class="btn" id="m-cancel">Cancel</button>
        </div>`;
    } else {
      menuEl.innerHTML = `
        ${title}
        <div class="menu-buttons">
          <button class="btn" id="m-add">&gt;&gt; TRACK</button>
          <button class="btn" id="m-settings">Prefs</button>
        </div>`;
    }
  }

  menuEl.addEventListener("click", e => {
    if (e.target.closest("#m-count"))    { toggleSelectAll(); return; }
    if (e.target.closest("#m-add"))      { fileIn.click();    return; }
    if (e.target.closest("#m-settings")) { openSettings();    return; }
    if (e.target.closest("#m-delete"))   { deleteSelected();  return; }
    if (e.target.closest("#m-cancel"))   { cancelSelection(); return; }
  });

  function toggleSelectAll() {
    if (S.selected.size === S.tracks.length && S.tracks.length > 0) {
      S.selected.clear();          // 全解除 → 0000
    } else {
      S.tracks.forEach(t => S.selected.add(t.id)); // 全選択
    }
    renderMenu(); renderLib();
  }

  // ── Selection mode ─────────────────────────────────────────
  function enterSelectionMode(id) {
    S.editMode = true; S.selected.add(id);
    renderMenu(); renderLib();
  }
  function toggleSel(id) {
    if (S.selected.has(id)) S.selected.delete(id); else S.selected.add(id);
    renderMenu(); renderLib();
  }
  function cancelSelection() {
    S.editMode = false; S.selected.clear();
    renderMenu(); renderLib();
  }
  async function deleteSelected() {
    const ids = Array.from(S.selected);
    if (!ids.length) return;
    if (!confirm(`Delete ${ids.length} track${ids.length>1?"s":""}?`)) return;
    for (const id of ids) {
      await dbDelete(id);
      if (S.current && S.current.id === id) stopPlayback();
    }
    S.editMode = false; S.selected.clear();
    renderMenu();
    await refreshLib();
  }

  // ── Import ─────────────────────────────────────────────────
  fileIn.addEventListener("change", async e => {
    const files = Array.from(e.target.files||[]);
    let n = 0;
    for (const f of files) {
      const ext = (f.name.split(".").pop()||"").toLowerCase();
      if (!SUPPORTED.has(ext)) continue;
      const track = {
        id: uid(), title: titleFrom(f.name), duration: 0,
        fileName: f.name, extension: ext, mimeType: f.type||"",
        blob: f, addedAt: Date.now(), playCount: 0,
      };
      try { await dbPut(track); n++; } catch(_) { toast(`Couldn't save "${f.name}"`); }
    }
    fileIn.value = "";
    toast(n===0 ? "No supported audio files found" : `${n} track${n>1?"s":""} added`);
    await refreshLib();
  });

  // ── Library render ─────────────────────────────────────────
  async function refreshLib() {
    try { S.tracks = await dbGetAll(); } catch(_) { toast("Couldn't load library"); S.tracks = []; }
    S.tracks.sort((a,b) => a.title.localeCompare(b.title));
    if (S.tracks.length === 0 && S.editMode) {
      S.editMode = false; S.selected.clear(); renderMenu();
    }
    renderLib();
  }

  function renderLib() {
    if (!S.tracks.length) {
      libEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-formats">
            <span class="pill">AAC</span>
            <span class="pill">AIFF</span>
            <span class="pill">FLAC</span>
            <span class="pill">M4A</span>
            <span class="pill">MP3</span>
            <span class="pill">OPUS</span>
            <span class="pill">WAV</span>
          </div>
        </div>`;
      return;
    }
    libEl.innerHTML = S.tracks.map((t,i) => {
      const isCur = S.current && S.current.id === t.id;
      const isSel = S.selected.has(t.id);
      let idx;
      if (S.editMode) idx = isSel ? "&#x25BA;" : "&#x00B7;&#x00B7;&#x00B7;&#x00B7;";
      else idx = isCur ? "&gt;&gt;&gt;&gt;" : pad4(i+1);
      const cls = ["track-row", isCur?"current":"", isSel?"selected":""].filter(Boolean).join(" ");
      const pill = t.extension==="opus" ? `<span class="pill">OPUS</span>` : `<span></span>`;
      return `
        <div class="${cls}" data-id="${t.id}">
          <div class="track-idx">${idx}</div>
          <div class="track-title">${esc(t.title)}</div>
          ${pill}
          <div class="track-dur">${t.duration ? fmt(t.duration) : "--:--"}</div>
        </div>`;
    }).join("");
  }

  // ── Library long-press gesture → selection mode ────────────
  const LP_MS = 450, MOVE_PX = 9;
  let G = null;

  libEl.addEventListener("pointerdown", e => {
    const row = e.target.closest(".track-row");
    if (!row) return;
    G = { id: row.getAttribute("data-id"), pid: e.pointerId, x0:e.clientX, y0:e.clientY, moved:false, fired:false, timer:null };
    G.timer = setTimeout(() => {
      if (!G || G.moved) return;
      G.fired = true;
      if (S.editMode) toggleSel(G.id); else enterSelectionMode(G.id);
    }, LP_MS);
  });
  libEl.addEventListener("pointermove", e => {
    if (!G || G.pid!==e.pointerId) return;
    if (!G.moved && (Math.abs(e.clientX-G.x0)>MOVE_PX || Math.abs(e.clientY-G.y0)>MOVE_PX)) {
      G.moved = true; clearTimeout(G.timer);
    }
  });
  libEl.addEventListener("pointerup", e => {
    if (!G || G.pid!==e.pointerId) { G=null; return; }
    clearTimeout(G.timer);
    if (!G.fired) {
      if (S.editMode) toggleSel(G.id);
      else {
        const idx = S.tracks.findIndex(t => t.id === G.id);
        if (idx >= 0) playQueueAt(S.tracks, idx);
      }
    }
    G = null;
  });
  libEl.addEventListener("pointercancel", () => { if(G) clearTimeout(G.timer); G=null; });

  // ── Now Playing ────────────────────────────────────────────
  function renderNP() {
    const t = S.current;
    if (!t) { npEl.innerHTML = ""; return; }

    npEl.innerHTML = `
      <div class="np-title-row">
        <div class="np-title">${esc(t.title)}</div>
      </div>
      <div class="seek-wrap">
        <div class="seek-track" id="seek-track">
          <div class="seek-fill" id="seek-fill" style="width:0%"></div>
          <div class="seek-thumb" id="seek-thumb" style="left:0%"></div>
        </div>
        <div class="np-times"><span id="np-cur">0:00</span><span id="np-dur">0:00</span></div>
      </div>
      <div class="np-transport">
        <button class="btn" id="np-prev">Prev</button>
        <button class="btn playpause" id="np-play">Play</button>
        <button class="btn" id="np-next">Next</button>
      </div>
      <div class="np-modes">
        <button class="btn" id="np-shuf">Shuffle</button>
        <button class="btn" id="np-rep">Repeat Off</button>
      </div>
      <div class="np-error" id="np-err"></div>`;

    const seekTrack = $("seek-track");
    let seekDrag = false;
    function seekByPtr(e) {
      const r = seekTrack.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      const d = (au.duration && isFinite(au.duration)) ? au.duration : (S.current?.duration || 0);
      au.currentTime = pct * d;
      setSeekBar(pct);
    }
    seekTrack.addEventListener("pointerdown", e => { seekDrag=true; seekTrack.setPointerCapture(e.pointerId); seekByPtr(e); });
    seekTrack.addEventListener("pointermove", e => { if(seekDrag) seekByPtr(e); });
    seekTrack.addEventListener("pointerup",   e => { if(seekDrag){ seekDrag=false; seekByPtr(e); } });
    seekTrack.addEventListener("pointercancel", () => { seekDrag=false; });

    $("np-prev").addEventListener("click", prev);
    $("np-play").addEventListener("click", togglePlay);
    $("np-next").addEventListener("click", next);
    $("np-shuf").addEventListener("click", () => { S.shuffle=!S.shuffle; updateAll(); });
    $("np-rep").addEventListener("click", () => {
      S.repeat = S.repeat==="off"?"all":S.repeat==="all"?"one":"off"; updateAll();
    });

    updateAll();
  }

  function setSeekBar(pct) {
    const fill=$("seek-fill"), thumb=$("seek-thumb");
    if (!fill||!thumb) return;
    const p = (pct*100).toFixed(2)+"%";
    fill.style.width = p; thumb.style.left = p;
  }

  // ── Playback ───────────────────────────────────────────────
  function playQueueAt(tracks, idx) { S.queue=tracks; S.qIdx=idx; loadAndPlay(tracks[idx]); }

  function loadAndPlay(track) {
    if (S.objURL) URL.revokeObjectURL(S.objURL);
    S.objURL = URL.createObjectURL(track.blob);
    const isNew = !S.current || S.current.id !== track.id;
    S.current = track; au.src = S.objURL;
    if (isNew) renderNP();
    else { const e=$("np-err"); if(e) e.textContent=""; }
    au.play().then(() => {
      S.playing=true; track.playCount=(track.playCount||0)+1; dbPut(track).catch(()=>{}); updateAll();
    }).catch(err => {
      S.playing=false; const e=$("np-err");
      if(e) e.textContent=`Can't play: ${err.message||"unsupported format"}`; updateAll();
    });
    updateMediaSession(track); updateAll();
  }

  function stopPlayback() {
    au.pause(); au.removeAttribute("src"); au.load();
    if (S.objURL) { URL.revokeObjectURL(S.objURL); S.objURL=null; }
    S.current=null; S.playing=false; S.queue=[]; S.qIdx=-1;
    renderNP(); updateAll();
  }

  function togglePlay() {
    if (!S.current) return;
    if (au.paused) au.play().then(()=>{S.playing=true;updateAll();}).catch(()=>{});
    else { au.pause(); S.playing=false; updateAll(); }
  }

  function advance(dir) {
    if (!S.queue.length) return;
    let idx = S.shuffle ? Math.floor(Math.random()*S.queue.length) : S.qIdx+dir;
    if (idx<0) { if(S.repeat==="all") idx=S.queue.length-1; else{au.pause();S.playing=false;updateAll();return;} }
    else if (idx>=S.queue.length) { if(S.repeat==="all") idx=0; else{au.pause();S.playing=false;updateAll();return;} }
    S.qIdx=idx; loadAndPlay(S.queue[idx]);
  }
  function next() { advance(1); }
  function prev() { if(au.currentTime>3){au.currentTime=0;return;} advance(-1); }

  au.addEventListener("ended", () => { if(S.repeat==="one"&&S.current){loadAndPlay(S.current);return;} next(); });
  au.addEventListener("timeupdate", () => {
    const dur = (au.duration&&isFinite(au.duration))?au.duration:(S.current?.duration||0);
    const cur = au.currentTime||0;
    setSeekBar(dur>0?cur/dur:0);
    const ce=$("np-cur"),de=$("np-dur");
    if(ce) ce.textContent=fmt(cur); if(de) de.textContent=fmt(dur);
  });
  au.addEventListener("durationchange", () => {
    if(S.current&&au.duration&&isFinite(au.duration)&&!S.current.duration){
      S.current.duration=au.duration; dbPut(S.current).catch(()=>{}); renderLib();
    }
  });
  au.addEventListener("error", () => {
    const e=$("np-err"); if(e) e.textContent="Can't play (unsupported format)";
    S.playing=false; updateAll();
  });

  // ── MediaSession ───────────────────────────────────────────
  function updateMediaSession(t) {
    if (!navigator.mediaSession) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: t.title });
    navigator.mediaSession.setActionHandler("play",  ()=>{au.play();S.playing=true;updateAll();});
    navigator.mediaSession.setActionHandler("pause", ()=>{au.pause();S.playing=false;updateAll();});
    navigator.mediaSession.setActionHandler("previoustrack", prev);
    navigator.mediaSession.setActionHandler("nexttrack", next);
    navigator.mediaSession.setActionHandler("seekto", d=>{if(d.seekTime!=null)au.currentTime=d.seekTime;});
  }

  // ── UI sync ────────────────────────────────────────────────
  function updateAll() {
    const pb=$("np-play"); if(pb) pb.textContent=S.playing?"Pause":"Play";
    const sh=$("np-shuf"); if(sh) sh.classList.toggle("active",S.shuffle);
    const rp=$("np-rep");
    if(rp){
      rp.classList.toggle("active",S.repeat!=="off");
      rp.textContent=S.repeat==="one"?"Repeat One":S.repeat==="all"?"Repeat All":"Repeat Off";
    }
    renderLib();
  }

  // ── Init ───────────────────────────────────────────────────
  loadSettings();
  applyTheme(S.theme);
  applyFontSize(S.fontSize);
  applyVolume(S.volume);
  applyPaneRatios();
  applySettingsPaneRatios();
  renderMenu();
  renderNP();
  refreshLib().catch(() => toast("Couldn't open library (Private Browsing isn't supported)"));
})();
</script>
</body>
</html>
